<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a120b"/>
      <stop offset=".55" stop-color="#68170f"/>
      <stop offset="1" stop-color="#1f0906"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0a8"/>
      <stop offset=".45" stop-color="#d9a83d"/>
      <stop offset="1" stop-color="#8f5d16"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity=".65"/>
    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="12" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="10.5" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <rect x="7" y="7" width="50" height="50" rx="9" fill="none" stroke="#180604" stroke-opacity=".65"/>

  <g filter="url(#s)" fill="url(#gold)" stroke="#5b3409" stroke-width=".45" stroke-linejoin="round">
    <!-- eagle wings -->
    <path d="M31.8 17c-3.8 1-6.8 3.7-8.5 7.2-4.3-2.7-9.4-4.2-15.1-4.6 5.4 5.9 11.3 9.6 18.1 10.7 1.5-1.4 2.9-2.5 5.5-3.2z"/>
    <path d="M32.2 17c3.8 1 6.8 3.7 8.5 7.2 4.3-2.7 9.4-4.2 15.1-4.6-5.4 5.9-11.3 9.6-18.1 10.7-1.5-1.4-2.9-2.5-5.5-3.2z"/>
    <path d="M13 22.4c4.9 3.9 9.3 6 13.3 6.8M17.5 20.8c3.6 3.3 7 5.2 10.2 6.2M50.9 22.4c-4.9 3.9-9.3 6-13.3 6.8M46.5 20.8c-3.6 3.3-7 5.2-10.2 6.2" fill="none" stroke="#6b3c0c" stroke-width="1"/>

    <!-- eagle body/head -->
    <path d="M32 16c3.2.3 5.4 2.4 5.9 5.2-1.8-1.1-3.4-1.2-4.7-.6 1.4 1.1 2.2 2.9 2.2 5.1 0 4.8-2.2 8.4-3.4 9.9-1.2-1.5-3.4-5.1-3.4-9.9 0-2.2.8-4 2.2-5.1-1.3-.6-2.9-.5-4.7.6.5-2.8 2.7-4.9 5.9-5.2z"/>
    <path d="M34.4 16.9c1.2-.9 3.2-.9 4.8.1-1.7.1-2.9.6-3.7 1.6z"/>
    <path d="M28.2 31.5h7.6l-3.8 7.1z"/>
    <path d="M27.2 35.1l-2.8 3.2 3.7-.9M36.8 35.1l2.8 3.2-3.7-.9" fill="none" stroke="#7a460d" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- SPQR plate -->
  <g filter="url(#s)">
    <rect x="15" y="38" width="34" height="13" rx="1.6" fill="#32100a" stroke="url(#gold)" stroke-width="1.8"/>
    <text x="32" y="48.4" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="url(#gold)" letter-spacing="1.2">SPQR</text>
  </g>

  <!-- simple laurel -->
  <g fill="url(#gold)" opacity=".9" stroke="#66400f" stroke-width=".35">
    <path d="M18 52c2.4-.5 4.2-1.4 5.6-2.8-2.6-.2-4.6.6-5.6 2.8zM24 53c2.5-.2 4.4-.9 5.9-2.2-2.5-.5-4.6.1-5.9 2.2z"/>
    <path d="M46 52c-2.4-.5-4.2-1.4-5.6-2.8 2.6-.2 4.6.6 5.6 2.8zM40 53c-2.5-.2-4.4-.9-5.9-2.2 2.5-.5 4.6.1 5.9 2.2z"/>
  </g>
</svg>
